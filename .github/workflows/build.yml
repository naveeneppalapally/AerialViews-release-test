name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'What changed in this release'
        required: true
        default: 'Bug fixes and improvements'

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      EXPECTED_SIGNER_SHA256: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > app/aerialviews-plus-release.jks

      - name: Build signed release APK
        run: ./gradlew --no-daemon :app:assembleGithubNonMinifiedRelease
        env:
          KEYSTORE_PATH: aerialviews-plus-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signer fingerprint
        run: |
          APK_PATH=$(find app/build/outputs/apk/github/nonMinifiedRelease -name '*.apk' | head -n 1)
          ACTUAL_SIGNER_SHA256=$(keytool -printcert -jarfile "$APK_PATH" | sed -n 's/.*SHA256: //p' | head -n 1 | tr -d '\r')

          echo "APK path: $APK_PATH"
          echo "Actual signer SHA256:   $ACTUAL_SIGNER_SHA256"

          if [ -z "$ACTUAL_SIGNER_SHA256" ]; then
            echo "Failed to read signer fingerprint from built APK" >&2
            exit 1
          fi

          if [ -z "$EXPECTED_SIGNER_SHA256" ]; then
            echo "No pinned signer fingerprint configured yet; skipping verification for this release"
            exit 0
          fi

          echo "Expected signer SHA256: $EXPECTED_SIGNER_SHA256"

          if [ "$ACTUAL_SIGNER_SHA256" != "$EXPECTED_SIGNER_SHA256" ]; then
            echo "APK signer fingerprint does not match the pinned release signer" >&2
            exit 1
          fi

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/github/nonMinifiedRelease/*.apk \
             dist/AerialViews-Plus-v${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: AerialViews+ v${{ github.event.inputs.version }}
          body: |
            ## What's changed
            ${{ github.event.inputs.release_notes }}

            ## Installation
            1. Download the APK below
            2. Enable "Install unknown apps" on your Android TV
            3. Install via file manager or ADB:
               `adb install -r AerialViews-Plus-v${{ github.event.inputs.version }}.apk`

            ## Notes
            - Sideload only — not for Google Play Store
            - If YouTube stops working, check NewPipe Extractor releases
            - Source code: github.com/naveeneppalapally/AerialViews-release-test

            **Full source:** https://github.com/naveeneppalapally/AerialViews-release-test
          files: dist/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        run: rm -f app/aerialviews-plus-release.jks
        if: always()
